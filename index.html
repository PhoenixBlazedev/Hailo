<!DOCTYPE html>
<html>
<head>
<title>Hailo AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
}

/* HOMEPAGE */
#home {
  height: 100vh;
  background: linear-gradient(120deg,#f8fafc,#e0f2fe);
  display: flex;
  flex-direction: column;
}

.topbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
}

.hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.hero h1 {
  font-size: 70px;
  color: #3b82f6;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

/* AUTH MODAL */
.modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

input {
  display: block;
  margin: 10px auto;
  padding: 10px;
}

/* DASHBOARD */
#dashboard {
  display: none;
  height: 100vh;
  background: #0f172a;
  color: white;
}

.chat-box {
  height: 80%;
  padding: 20px;
  overflow-y: auto;
}

.input-box {
  display: flex;
  padding: 10px;
}

.input-box input {
  flex: 1;
}

.user { text-align: right; }
.bot { color: #38bdf8; }

</style>
</head>

<body>

<!-- HOMEPAGE -->
<div id="home">
  <div class="topbar">
    <h2>Hailo</h2>
    <button onclick="openModal()">Sign In</button>
  </div>

  <div class="hero">
    <h1>hailo</h1>
    <p>Into the future of AI</p>
    <button onclick="openModal()">Start Now</button>
  </div>
</div>

<!-- AUTH -->
<div class="modal" id="authBox">
  <div class="box">
    <h3>Login / Signup</h3>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <button onclick="logout()">Logout</button>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-box">
    <input id="msgInput">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBrdZoD5fQivPTJAe8zeRmx9cFysGZW4K4",
  authDomain: "hailo-11a4a.firebaseapp.com",
  projectId: "hailo-11a4a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// MODAL
window.openModal = () => document.getElementById("authBox").style.display = "flex";
window.closeModal = () => document.getElementById("authBox").style.display = "none";

// AUTH
window.signup = async () => {
  try {
    await createUserWithEmailAndPassword(auth, email.value, password.value);
    alert("Signed up 🔥");
  } catch (e) { alert(e.message); }
};

window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
    alert("Logged in ✅");
  } catch (e) { alert(e.message); }
};

window.logout = () => signOut(auth);

// REDIRECT LOGIC
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("home").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    closeModal();
  } else {
    document.getElementById("home").style.display = "flex";
    document.getElementById("dashboard").style.display = "none";
  }
});

// CHAT
window.sendMsg = () => {
  let text = msgInput.value;
  if (!text) return;

  chatBox.innerHTML += `<div class="user">${text}</div>`;
  setTimeout(() => {
    chatBox.innerHTML += `<div class="bot">AI reply 🤖</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;
  }, 500);

  msgInput.value = "";
};

</script>

</body>
</html>
