<!DOCTYPE html>
<html>
<head>
  <title>Hailo.AI</title>

  <!-- jQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .header {
      padding: 20px;
      text-align: center;
      background: #1e293b;
      position: relative;
    }

    .signin-btn {
      position: absolute;
      right: 20px;
      top: 20px;
      padding: 10px 15px;
      background: #38bdf8;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .signin-btn:hover {
      background: #0ea5e9;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: 40px;
    }

    .hero p {
      color: #94a3b8;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      background: #22c55e;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

  <div class="header">
    <h2>Hailo.AI</h2>
    <button class="signin-btn">Sign In</button>
  </div>

  <div class="hero">
    <h1>The Era Of Technology</h1>
    
    <button class="btn">Get Started</button>
  </div>

  <script>
    // jQuery stuff
    $(document).ready(function(){

      $(".signin-btn").click(function(){
        alert("Sign-in coming soon 👀");
      });

      $(".btn").click(function(){
        $("body").css("background", "#020617");
      });

    });
  </script>

</body>
</html>
