<!DOCTYPE html>
<html>
<head>
<title>Hailo AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(120deg, #f8fbff, #e0f7ff);
  overflow-x: hidden;
  position: relative;
  color: #0f172a;
}

/* CURVY BLUR BACKGROUND */
body::before,
body::after {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(56,189,248,0.4), transparent 70%);
  filter: blur(120px);
  border-radius: 50%;
  z-index: -1;
}

body::before {
  top: -100px;
  left: -100px;
}

body::after {
  bottom: -100px;
  right: -100px;
}

/* TOPBAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
}

/* HERO */
.hero {
  text-align: center;
  margin-top: 40px;
}

.hero h1 {
  font-size: 80px;
  font-weight: 600;
  color: #0284c7;
  letter-spacing: -1px;
}

.hero p {
  color: #334155;
}

/* BUTTON */
button {
  padding: 12px 24px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(90deg,#38bdf8,#22c55e);
  color: white;
  cursor: pointer;
}

/* CARDS */
.cards {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 60px;
}

.card {
  width: 260px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(15px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-8px);
}

.card h3 {
  color: #0284c7;
}

.card p {
  font-size: 14px;
  color: #334155;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  justify-content: center;
  align-items: center;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input {
  display: block;
  margin: 10px auto;
  padding: 10px;
}

/* DASHBOARD */
#dashboard {
  display: none;
  height: 100vh;
  background: #0f172a;
  color: white;
}

.chat-box {
  height: 80%;
  padding: 20px;
}

.input-box {
  display: flex;
  padding: 10px;
}

.input-box input {
  flex: 1;
}

.user { text-align: right; }
.bot { color: #38bdf8; }

</style>
</head>

<body>

<div id="home">
  <div class="topbar">
    <h2>Hailo</h2>
    <button onclick="openModal()">Sign In</button>
  </div>

  <div class="hero">
    <h1>hailo</h1>
    <p>Into the future of AI</p>
    <br>
    <button onclick="openModal()">Start Now</button>
  </div>

  <div class="cards">
    <div class="card" onclick="openModal()">
      <h3>Start Now</h3>
      <p>Jump into AI instantly.</p>
    </div>

    <div class="card" onclick="openModal()">
      <h3>Explore</h3>
      <p>Discover AI tools.</p>
    </div>

    <div class="card" onclick="openModal()">
      <h3>Build</h3>
      <p>Create your own AI apps.</p>
    </div>
  </div>
</div>

<div class="modal" id="authBox">
  <div class="box">
    <h3>Login / Signup</h3>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<div id="dashboard">
  <button onclick="logout()">Logout</button>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-box">
    <input id="msgInput">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBrdZoD5fQivPTJAe8zeRmx9cFysGZW4K4",
  authDomain: "hailo-11a4a.firebaseapp.com",
  projectId: "hailo-11a4a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.openModal = () => authBox.style.display = "flex";
window.closeModal = () => authBox.style.display = "none";

window.signup = async () => {
  try {
    await createUserWithEmailAndPassword(auth, email.value, password.value);
    alert("Signed up 🔥");
  } catch(e){ alert(e.message); }
};

window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
    alert("Logged in ✅");
  } catch(e){ alert(e.message); }
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth,(user)=>{
  if(user){
    home.style.display="none";
    dashboard.style.display="block";
    closeModal();
  } else {
    home.style.display="block";
    dashboard.style.display="none";
  }
});

window.sendMsg = () => {
  let text = msgInput.value;
  if(!text) return;

  chatBox.innerHTML += `<div class="user">${text}</div>`;
  setTimeout(()=>{
    chatBox.innerHTML += `<div class="bot">AI reply 🤖</div>`;
  },500);

  msgInput.value="";
};

</script>

</body>
</html>
