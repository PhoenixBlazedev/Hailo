<!DOCTYPE html>
<html>
<head>
<title>hailo AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f8fbff;
  overflow-x:hidden;
  color:#0f172a;
}

/* BG */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

.bg span{
  position:absolute;
  width:500px;
  height:500px;
  border-radius:50%;
  filter:blur(120px);
  animation:float 15s infinite alternate ease-in-out;
}

.bg span:nth-child(1){background:#38bdf8;top:-100px;left:-100px;}
.bg span:nth-child(2){background:#7dd3fc;bottom:-100px;right:-100px;animation-delay:3s;}
.bg span:nth-child(3){background:#bae6fd;top:40%;left:60%;animation-delay:6s;}

@keyframes float{
  0%{transform:translate(0,0);}
  100%{transform:translate(80px,60px);}
}

/* NAV */
.topbar{
  display:flex;
  justify-content:center;
  padding:20px;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.5);
}

/* HERO */
.hero{
  text-align:center;
  margin-top:80px;
}

.hero h1{
  font-size:90px;
  background:linear-gradient(90deg,#38bdf8,#0ea5e9,#7dd3fc);
  background-size:200%;
  -webkit-background-clip:text;
  color:transparent;
  animation:gradientMove 5s infinite linear;
}

@keyframes gradientMove{
  0%{background-position:0%;}
  100%{background-position:200%;}
}

/* CARDS */
.cards{
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:100px;
  position:relative;
  z-index:10;
}

.card{
  width:260px;
  height:200px;
  border-radius:25px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(25px);
  -webkit-backdrop-filter:blur(25px);
  border:1px solid rgba(255,255,255,0.3);
  cursor:pointer;
  transition:all 0.3s ease;
  padding:20px;
  text-align:center;
}

.card:hover{
  transform:scale(1.08);
  box-shadow:0 20px 60px rgba(56,189,248,0.4);
}

.card h3{
  margin-bottom:10px;
}

.card p{
  font-size:14px;
  opacity:0.7;
}

/* WAVE */
.wave-container{
  position:absolute;
  bottom:0;
  width:100%;
  overflow:hidden;
  z-index:0;
  pointer-events:none;
}

.wave{
  display:flex;
  width:200%;
  animation:waveLoop 10s linear infinite;
}

.wave svg{
  width:50%;
  height:200px;
}

@keyframes waveLoop{
  0%{transform:translateX(0);}
  100%{transform:translateX(-50%);}
}

/* SIGN IN BUTTON (BOTTOM) */
.sign-section{
  text-align:center;
  margin-top:200px;
}

.sign-btn{
  padding:12px 30px;
  border-radius:30px;
  border:none;
  background:linear-gradient(90deg,#38bdf8,#0ea5e9);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

.sign-btn:hover{
  transform:scale(1.1);
  box-shadow:0 10px 30px rgba(56,189,248,0.5);
}

/* SCROLL TEXT */
.scroll-text{
  text-align:center;
  margin-top:200px;
  font-size:40px;
  opacity:0;
  transform:translateY(50px);
}

/* FINAL SECTION */
.footer{
  text-align:center;
  margin-top:200px;
}

.footer h2{
  font-size:50px;
  background:linear-gradient(90deg,#38bdf8,#0ea5e9,#7dd3fc);
  -webkit-background-clip:text;
  color:transparent;
}

.icons{
  margin-top:20px;
}

.icons span{
  margin:0 15px;
  font-size:20px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="bg">
  <span></span>
  <span></span>
  <span></span>
</div>

<div class="topbar">
  <h2>hailo</h2>
</div>

<div class="hero">
  <h1>hailo</h1>
  <p>Into the Era of Technology</p>
</div>

<div class="cards">
  <div class="card">
    <h3>Start</h3>
    <p>Begin your journey with AI tools and smart automation.</p>
  </div>

  <div class="card">
    <h3>Explore</h3>
    <p>Discover features, models, and future tech innovations.</p>
  </div>
</div>

<div class="wave-container">
  <div class="wave">
    <svg viewBox="0 0 1440 320">
      <path fill="#38bdf8" fill-opacity="0.3"
      d="M0,160L60,170C120,180,240,200,360,186.7C480,173,600,127,720,122.7C840,117,960,149,1080,165.3C1200,181,1320,181,1440,181L1440,320L0,320Z"></path>
    </svg>
    <svg viewBox="0 0 1440 320">
      <path fill="#38bdf8" fill-opacity="0.3"
      d="M0,160L60,170C120,180,240,200,360,186.7C480,173,600,127,720,122.7C840,117,960,149,1080,165.3C1200,181,1320,181,1440,181L1440,320L0,320Z"></path>
    </svg>
  </div>
</div>

<!-- SIGN BUTTON -->
<div class="sign-section">
  <button class="sign-btn" onclick="goToSignIn()">Sign In</button>
</div>

<!-- SCROLL TEXT -->
<div class="scroll-text">
  hailo to the era of technology
</div>

<!-- FOOTER -->
<div class="footer">
  <h2>hailo</h2>
  <div class="icons">
    <span>📧</span>
    <span>💬</span>
    <span>🛠️</span>
  </div>
</div>

<script>
function goToSignIn(){
  window.location.href = "sign_in.html";
}
/* SCROLL ANIMATION */
$(window).on("scroll", function(){
  let scroll = $(window).scrollTop();

  if(scroll > 300){
    $(".scroll-text").css({
      opacity:1,
      transform:"translateY(0)"
    });
  }
});

</script>

</body>
</html>
