<!DOCTYPE html>
<html>
<head>
<title>Hailo AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: #0f172a;
  color: white;
}

/* AUTH PAGE */
#authPage {
  text-align: center;
  margin-top: 100px;
}

input {
  padding: 10px;
  margin: 10px;
  width: 250px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 10px 20px;
  margin: 5px;
  cursor: pointer;
  border-radius: 6px;
  border: none;
  background: #3b82f6;
  color: white;
}

/* DASHBOARD */
#dashboard {
  display: none;
  height: 100vh;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: #1e293b;
}

/* CHAT */
.chat-container {
  display: flex;
  flex-direction: column;
  height: calc(100% - 50px);
}

.chat-box {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.msg {
  margin: 10px 0;
}

.user {
  text-align: right;
}

.bot {
  text-align: left;
  color: #38bdf8;
}

.input-box {
  display: flex;
  padding: 10px;
  background: #1e293b;
}

.input-box input {
  flex: 1;
  margin: 0;
}

</style>
</head>

<body>

<div id="authPage">
  <h1>Hailo AI</h1>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="dashboard">
  <div class="topbar">
    <div>Hailo AI</div>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="chat-container">
    <div class="chat-box" id="chatBox"></div>

    <div class="input-box">
      <input id="msgInput" placeholder="Ask something...">
      <button onclick="sendMsg()">Send</button>
    </div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBrdZoD5fQivPTJAe8zeRmx9cFysGZW4K4",
  authDomain: "hailo-11a4a.firebaseapp.com",
  projectId: "hailo-11a4a",
  storageBucket: "hailo-11a4a.firebasestorage.app",
  messagingSenderId: "279653855334",
  appId: "1:279653855334:web:7e9d5022070041346bfda7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.signup = async function() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  try {
    let userCred = await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", userCred.user.uid), {
      email: email,
      createdAt: new Date()
    });

    alert("Account created 🔥");
  } catch (e) {
    alert(e.message);
  }
};

window.login = async function() {
  try {
    await signInWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("password").value);
    alert("Logged in ✅");
  } catch (e) {
    alert(e.message);
  }
};

window.logout = function() {
  signOut(auth);
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("authPage").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } else {
    document.getElementById("authPage").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
  }
});

window.sendMsg = function() {
  let input = document.getElementById("msgInput");
  let text = input.value;

  if (!text) return;

  let chatBox = document.getElementById("chatBox");

  chatBox.innerHTML += `<div class="msg user">${text}</div>`;

  setTimeout(() => {
    chatBox.innerHTML += `<div class="msg bot">AI: This is a demo response 🤖</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;
  }, 500);

  input.value = "";
};

</script>

</body>
</html>
