<!DOCTYPE html>
<html>
<head>
<title>Hailo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  background: linear-gradient(120deg, #eef2ff, #dbeafe);
  display: flex;
  flex-direction: column;
  align-items: center;
  color: #1e293b;
}

/* TOP BAR */
.topbar {
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
}

.logo {
  font-weight: 700;
  font-size: 22px;
  color: #2563eb;
}

.nav {
  font-size: 14px;
  color: #334155;
}

/* HERO */
.hero {
  text-align: center;
  margin-top: 60px;
}

.hero h1 {
  font-size: 70px;
  color: #3b82f6;
}

.hero h2 {
  margin-top: 10px;
  font-weight: 500;
  color: #475569;
}

/* CARDS */
.cards {
  display: flex;
  gap: 30px;
  margin-top: 50px;
}

.card {
  width: 280px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card h3 {
  color: #2563eb;
}

.card p {
  margin-top: 10px;
  font-size: 14px;
  color: #475569;
}

</style>
</head>

<body>

<div class="topbar">
  <div class="logo">Hailo</div>
  <div class="nav">Get App</div>
</div>

<div class="hero">
  <h1>hailo</h1>
  <h2>Into the future</h2>
</div>

<div class="cards">
  <div class="card">
    <h3>Start Now</h3>
    <p>Free access to AI tools. Experience smart systems.</p>
  </div>

  <div class="card">
    <h3>Access API</h3>
    <p>Build powerful apps using modern AI models.</p>
  </div>
</div>

</body>
</html>
