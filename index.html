<!DOCTYPE html>
<html>
<head>
<title>Hailo AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at 20% 30%, #60a5fa, transparent),
              radial-gradient(circle at 80% 70%, #22c55e, transparent),
              linear-gradient(120deg, #020617, #0f172a);
  color: white;
}

/* TOPBAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
}

/* HERO */
.hero {
  text-align: center;
  margin-top: 40px;
}

.hero h1 {
  font-size: 80px;
  background: linear-gradient(90deg,#38bdf8,#22c55e,#a78bfa);
  -webkit-background-clip: text;
  color: transparent;
  letter-spacing: 2px;
}

.hero p {
  color: #cbd5f5;
}

/* BUTTONS */
button {
  padding: 12px 24px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(90deg,#38bdf8,#22c55e);
  color: white;
  cursor: pointer;
}

/* CARDS (THE SQUARE THINGS) */
.cards {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 60px;
}

.card {
  width: 260px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-8px) scale(1.03);
}

.card h3 {
  color: #38bdf8;
}

.card p {
  font-size: 14px;
  color: #cbd5f5;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 10px;
  color: black;
}

input {
  display: block;
  margin: 10px auto;
  padding: 10px;
}

/* DASHBOARD */
#dashboard {
  display: none;
  height: 100vh;
  background: #0f172a;
}

.chat-box {
  height: 80%;
  padding: 20px;
}

.input-box {
  display: flex;
  padding: 10px;
}

.input-box input {
  flex: 1;
}

.user { text-align: right; }
.bot { color: #38bdf8; }

</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <div class="topbar">
    <h2>Hailo</h2>
    <button onclick="openModal()">Sign In</button>
  </div>

  <div class="hero">
    <h1>hailo</h1>
    <p>Into the future of AI</p>
    <br>
    <button onclick="openModal()">Start Now</button>
  </div>

  <!-- CARDS -->
  <div class="cards">
    <div class="card" onclick="openModal()">
      <h3>Start Now</h3>
      <p>Jump into AI instantly and explore features.</p>
    </div>

    <div class="card" onclick="openModal()">
      <h3>Explore AI</h3>
      <p>Discover tools, models, and smart systems.</p>
    </div>

    <div class="card" onclick="openModal()">
      <h3>Build Projects</h3>
      <p>Create your own AI-powered applications.</p>
    </div>
  </div>
</div>

<!-- AUTH -->
<div class="modal" id="authBox">
  <div class="box">
    <h3>Login / Signup</h3>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <button onclick="logout()">Logout</button>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-box">
    <input id="msgInput">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBrdZoD5fQivPTJAe8zeRmx9cFysGZW4K4",
  authDomain: "hailo-11a4a.firebaseapp.com",
  projectId: "hailo-11a4a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.openModal = () => authBox.style.display = "flex";
window.closeModal = () => authBox.style.display = "none";

window.signup = async () => {
  try {
    await createUserWithEmailAndPassword(auth, email.value, password.value);
    alert("Signed up 🔥");
  } catch(e){ alert(e.message); }
};

window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
    alert("Logged in ✅");
  } catch(e){ alert(e.message); }
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth,(user)=>{
  if(user){
    home.style.display="none";
    dashboard.style.display="block";
    closeModal();
  } else {
    home.style.display="block";
    dashboard.style.display="none";
  }
});

window.sendMsg = () => {
  let text = msgInput.value;
  if(!text) return;

  chatBox.innerHTML += `<div class="user">${text}</div>`;
  setTimeout(()=>{
    chatBox.innerHTML += `<div class="bot">AI reply 🤖</div>`;
  },500);

  msgInput.value="";
};

</script>

</body>
</html>
