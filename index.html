<!DOCTYPE html>
<html>
<head>
<title>hailo AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(120deg, #f8fbff, #e0f7ff);
  overflow-x: hidden;
  color: #0f172a;
  position: relative;
}

/* BACKGROUND GLOW BLOBS (fixes plain look) */
body::before, body::after {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(56,189,248,0.3), transparent);
  filter: blur(120px);
  z-index: -1;
}

body::before {
  top: 0;
  left: 0;
}

body::after {
  bottom: 0;
  right: 0;
}

/* NAVBAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.4);
}

.topbar button {
  background: none;
  border: none;
  color: #0284c7;
  font-weight: 500;
  cursor: pointer;
}

/* HERO */
.hero {
  text-align: center;
  margin-top: 80px;
}

.hero h1 {
  font-size: 80px;
  color: #0284c7;
}

/* CARDS */
.cards {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 100px;
}

.card {
  width: 260px;
  height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 25px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(56,189,248,0.3);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

/* FULL CARD HOVER (fix) */
.card::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at center, rgba(56,189,248,0.3), transparent 60%);
  opacity: 0;
  transition: 0.4s;
}

.card:hover::before {
  opacity: 1;
}

/* TEXT */
.card h3 {
  position: relative;
  z-index: 2;
}

/* WAVE */
.wave-container {
  position: absolute;
  bottom: 0;
  width: 100%;
}

.wave-container svg {
  width: 200%;
  height: 200px;
  animation: waveMove 12s linear infinite;
}

@keyframes waveMove {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  justify-content: center;
  align-items: center;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input {
  display: block;
  margin: 10px auto;
  padding: 10px;
}

/* DASHBOARD */
#dashboard {
  display: none;
  height: 100vh;
  background: #0f172a;
  color: white;
}

.chat-box {
  height: 80%;
  padding: 20px;
}

.input-box {
  display: flex;
  padding: 10px;
}

.input-box input {
  flex: 1;
}

.user { text-align: right; }
.bot { color: #38bdf8; }

</style>
</head>

<body>

<div id="home">
  <div class="topbar">
    <h2>hailo</h2>
    <button onclick="openModal()">Sign In</button>
  </div>

  <div class="hero">
    <h1>hailo</h1>
    <p>Into the future of AI</p>
  </div>

  <div class="cards">
    <div class="card" onclick="openModal()">
      <h3>Start</h3>
    </div>

    <div class="card" onclick="openModal()">
      <h3>Explore</h3>
    </div>
  </div>

  <!-- WAVE -->
  <div class="wave-container">
    <svg viewBox="0 0 1440 320">
      <path fill="#38bdf8" fill-opacity="0.3"
        d="M0,160L60,170C120,180,240,200,360,186.7C480,173,600,127,720,122.7C840,117,960,149,1080,165.3C1200,181,1320,181,1440,181L1440,320L0,320Z">
      </path>
    </svg>
  </div>

</div>

<div class="modal" id="authBox">
  <div class="box">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<div id="dashboard">
  <button onclick="logout()">Logout</button>
  <div class="chat-box" id="chatBox"></div>
  <div class="input-box">
    <input id="msgInput">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBrdZoD5fQivPTJAe8zeRmx9cFysGZW4K4",
  authDomain: "hailo-11a4a.firebaseapp.com",
  projectId: "hailo-11a4a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.openModal = () => authBox.style.display = "flex";
window.closeModal = () => authBox.style.display = "none";

window.signup = async () => {
  try { await createUserWithEmailAndPassword(auth,email.value,password.value); alert("Signed up"); }
  catch(e){ alert(e.message); }
};

window.login = async () => {
  try { await signInWithEmailAndPassword(auth,email.value,password.value); alert("Logged in"); }
  catch(e){ alert(e.message); }
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth,(user)=>{
  if(user){
    home.style.display="none";
    dashboard.style.display="block";
    closeModal();
  } else {
    home.style.display="block";
    dashboard.style.display="none";
  }
});

window.sendMsg = () => {
  let text = msgInput.value;
  if(!text) return;
  chatBox.innerHTML += `<div class="user">${text}</div>`;
  setTimeout(()=>chatBox.innerHTML += `<div class="bot">AI 🤖</div>`,500);
  msgInput.value="";
};

</script>

</body>
</html>
