<!DOCTYPE html>
<html>
<head>
<title>Hailo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  height: 100vh;
  background: linear-gradient(120deg, #f8fafc, #e0f2fe);
  display: flex;
  flex-direction: column;
  align-items: center;
  color: #0f172a;
}

/* TOPBAR */
.topbar {
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  font-size: 14px;
  color: #64748b;
}

.logo {
  font-weight: 600;
  color: #3b82f6;
  cursor: pointer;
}

/* HERO */
.hero {
  text-align: center;
  margin-top: 80px;
}

.hero h1 {
  font-size: 80px;
  font-weight: 600;
  color: #3b82f6;
}

.hero h2 {
  margin-top: 10px;
  font-weight: 400;
  color: #334155;
}

/* CARDS */
.cards {
  display: flex;
  gap: 30px;
  margin-top: 70px;
}

.card {
  width: 300px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.08);
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-8px);
}

.card h3 {
  color: #2563eb;
}

.card p {
  margin-top: 10px;
  font-size: 14px;
  color: #475569;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: white;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  width: 300px;
  position: relative;
}

.modal-box input {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
}

.modal-box button {
  padding: 10px 20px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.close {
  position: absolute;
  right: 15px;
  top: 10px;
  cursor: pointer;
  font-size: 20px;
}

</style>
</head>

<body>

<div class="topbar">
  <div class="logo" onclick="scrollTopPage()">hailo</div>
  <div onclick="openModal()" style="cursor:pointer;">Sign In</div>
</div>

<div class="hero">
  <h1>hailo</h1>
  <h2>Into the unknown</h2>
</div>

<div class="cards">
  <div class="card" onclick="startNow()">
    <h3>Start Now</h3>
    <p>Free access to AI. Experience intelligent systems.</p>
  </div>

  <div class="card" onclick="apiAccess()">
    <h3>Access API</h3>
    <p>Build apps with powerful AI models.</p>
  </div>
</div>

<div class="modal" id="loginModal">
  <div class="modal-box">
    <span class="close" onclick="closeModal()">×</span>
    <h2>Sign In</h2>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<script>

function openModal() {
  document.getElementById("loginModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("loginModal").style.display = "none";
}

function login() {
  alert("Logged in (demo only)");
}

function startNow() {
  alert("Starting AI experience 🚀");
}

function apiAccess() {
  alert("API access coming soon 👀");
}

function scrollTopPage() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

</script>

</body>
</html>
